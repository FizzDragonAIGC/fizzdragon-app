<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FizzDragon · IP共创生态 (MVP)</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");

      :root {
        --bg: #050508;
        --panel: #0b0b11;
        --panel2: #0f0f18;
        --border: #1e1e2a;
        --text: #f3f3ff;
        --muted: #9a9ab0;
        --accent: #e31b23;
        --accent2: #a80f15;
        --good: #22c55e;
        --warn: #f59e0b;
        --info: #60a5fa;

        --shadow: 0 10px 30px rgba(0, 0, 0, 0.55);
        --radius: 14px;
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family:
          Inter,
          -apple-system,
          system-ui,
          Segoe UI,
          Roboto,
          Arial,
          sans-serif;
        background:
          radial-gradient(
            900px 500px at 20% 20%,
            rgba(227, 27, 35, 0.18),
            transparent 60%
          ),
          radial-gradient(
            800px 500px at 90% 40%,
            rgba(227, 27, 35, 0.1),
            transparent 60%
          ),
          var(--bg);
        color: var(--text);
        overflow: hidden;
      }

      .app {
        display: flex;
        height: 100%;
        width: 100%;
      }

      /* Chat Dock (slide-out from left) */
      .chatDock {
        position: fixed;
        top: 12px;
        left: 12px;
        width: 392px;
        height: calc(100vh - 24px);
        max-height: 860px;
        transition: transform 0.22s cubic-bezier(0.4, 0, 0.2, 1);
        will-change: transform;
        background:
          radial-gradient(
            600px 260px at 20% 0%,
            rgba(227, 27, 35, 0.28),
            transparent 60%
          ),
          radial-gradient(
            520px 260px at 90% 0%,
            rgba(227, 27, 35, 0.16),
            transparent 60%
          ),
          rgba(10, 10, 16, 0.92);
        border: 1px solid rgba(227, 27, 35, 0.32);
        border-radius: 18px;
        box-shadow:
          0 22px 80px rgba(0, 0, 0, 0.78),
          0 0 0 1px rgba(255, 255, 255, 0.05) inset,
          0 0 46px rgba(227, 27, 35, 0.14);
      }

      /* Make the dock visually obvious */
      .chatDock::before {
        content: "";
        position: absolute;
        inset: -1px;
        border-radius: 18px;
        padding: 1px;
        background: linear-gradient(
          135deg,
          rgba(227, 27, 35, 0.55),
          rgba(255, 255, 255, 0.1),
          rgba(227, 27, 35, 0.25)
        );
        -webkit-mask:
          linear-gradient(#000 0 0) content-box,
          linear-gradient(#000 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
        opacity: 0.85;
      }
      .chatDock::after {
        content: "助手";
        position: absolute;
        top: 10px;
        right: 92px;
        font-size: 10px;
        letter-spacing: 0.22em;
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid rgba(227, 27, 35, 0.4);
        background: rgba(227, 27, 35, 0.12);
        color: #ffd2d5;
        text-transform: uppercase;
        pointer-events: none;
        opacity: 0.95;
        backdrop-filter: blur(12px);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        z-index: 50;
      }
      .chatDock.collapsed {
        transform: translateX(-338px);
      }
      .chatDock.min {
        height: 54px;
        width: 300px;
      }

      /* Handle (always visible) */
      .dockHandle {
        position: absolute;
        top: 14px;
        left: 100%;
        margin-left: 10px;
        width: 52px;
        border-radius: 14px;
        border: 1px solid rgba(227, 27, 35, 0.28);
        background: rgba(0, 0, 0, 0.45);
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.55);
        padding: 10px 8px;
        cursor: pointer;
        user-select: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }
      .dockHandle .dino {
        font-size: 20px;
        line-height: 1;
        filter: drop-shadow(0 10px 18px rgba(0, 0, 0, 0.6));
        animation: dinoBounce 1.6s ease-in-out infinite;
      }
      .dockHandle .handleText {
        font-size: 10px;
        letter-spacing: 0.22em;
        color: #ffd2d5;
        writing-mode: vertical-rl;
        text-orientation: mixed;
        opacity: 0.9;
      }
      @keyframes dinoBounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-4px);
        }
      }

      .dockTop {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 12px 14px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        background: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.55),
          rgba(0, 0, 0, 0.25)
        );
      }

      .dockBrand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }
      .dockLogo {
        width: 26px;
        height: 26px;
        border-radius: 10px;
        background: radial-gradient(
          circle at 30% 30%,
          rgba(227, 27, 35, 0.95),
          rgba(168, 15, 21, 0.9)
        );
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.05) inset,
          0 10px 26px rgba(227, 27, 35, 0.22);
        position: relative;
        flex: 0 0 auto;
      }
      .dockLogo::after {
        content: "F";
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        font-weight: 900;
        font-size: 14px;
        color: #fff;
        letter-spacing: 0.5px;
        text-shadow: 0 10px 20px rgba(0, 0, 0, 0.6);
      }
      .dockText {
        min-width: 0;
      }
      .dockText .titleRow {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .dockPill {
        font-size: 10px;
        padding: 3px 8px;
        border-radius: 999px;
        border: 1px solid rgba(227, 27, 35, 0.35);
        color: #ffb0b5;
        background: rgba(227, 27, 35, 0.1);
        white-space: nowrap;
      }
      .dockTop .title {
        font-weight: 900;
        letter-spacing: 0.4px;
        font-size: 13px;
      }
      .dockTop .hint {
        font-size: 11px;
        color: var(--muted);
        margin-top: 2px;
      }
      .dockBtns {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .iconBtn {
        cursor: pointer;
        font-size: 12px;
        padding: 6px 10px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
        color: var(--text);
        user-select: none;
        transition: 0.15s ease;
      }
      .iconBtn:hover {
        border-color: rgba(227, 27, 35, 0.55);
        transform: translateY(-1px);
      }
      .iconBtn.primary {
        border-color: rgba(227, 27, 35, 0.35);
        background: rgba(227, 27, 35, 0.08);
      }

      /* legacy name for layout blocks */
      .left {
        width: 340px;
        background: transparent;
        border-right: none;
        display: flex;
        flex-direction: column;
        min-width: 280px;
      }
      .brand {
        padding: 16px 16px 12px;
        border-bottom: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.35);
      }
      .brand .title {
        font-weight: 800;
        letter-spacing: 0.5px;
      }
      .brand .sub {
        margin-top: 6px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.2;
      }

      .chat {
        flex: 1;
        padding: 12px;
        overflow: auto;
        scrollbar-width: thin;
        scrollbar-color: rgba(227, 27, 35, 0.25) transparent;
      }
      .chat::-webkit-scrollbar {
        width: 10px;
      }
      .chat::-webkit-scrollbar-thumb {
        background: rgba(227, 27, 35, 0.18);
        border: 2px solid transparent;
        border-radius: 999px;
        background-clip: padding-box;
      }
      .msg {
        display: flex;
        gap: 10px;
        margin: 10px 0;
      }
      .msg .b {
        max-width: 92%;
        padding: 10px 12px;
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.03);
        box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
        white-space: pre-wrap;
        line-height: 1.4;
        font-size: 13px;
      }
      .msg.user {
        justify-content: flex-end;
      }
      .msg.user .b {
        border-color: rgba(227, 27, 35, 0.28);
        background: linear-gradient(
          135deg,
          rgba(227, 27, 35, 0.16),
          rgba(168, 15, 21, 0.1)
        );
      }
      .msg.ai .b {
        background: rgba(255, 255, 255, 0.03);
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }
      .chip {
        cursor: pointer;
        font-size: 12px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: var(--text);
        background: rgba(255, 255, 255, 0.03);
        transition: 0.15s ease;
        user-select: none;
      }
      .chip:hover {
        border-color: rgba(227, 27, 35, 0.55);
        background: rgba(227, 27, 35, 0.1);
        transform: translateY(-1px);
      }

      .composer {
        padding: 12px;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        background: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.1),
          rgba(0, 0, 0, 0.45)
        );
      }
      .row {
        display: flex;
        gap: 10px;
      }
      .input {
        flex: 1;
        padding: 10px 12px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
        color: var(--text);
        outline: none;
        transition: 0.15s ease;
      }
      .input:focus {
        border-color: rgba(227, 27, 35, 0.4);
        box-shadow: 0 0 0 3px rgba(227, 27, 35, 0.12);
      }
      .btn {
        padding: 10px 12px;
        border-radius: 14px;
        border: 1px solid rgba(227, 27, 35, 0.55);
        background: linear-gradient(
          135deg,
          rgba(227, 27, 35, 0.92),
          rgba(168, 15, 21, 0.92)
        );
        color: #fff;
        font-weight: 800;
        cursor: pointer;
        transition: 0.15s ease;
        box-shadow: 0 10px 24px rgba(227, 27, 35, 0.18);
      }
      .btn:hover {
        filter: brightness(1.06);
        transform: translateY(-1px);
      }

      /* Main */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
        /* Reserve space for the fixed chat dock on the left (no overlap) */
        margin-left: 440px;
        transition: margin-left 0.22s cubic-bezier(0.4, 0, 0.2, 1);
        will-change: margin-left;
      }
      body.dock-min .main {
        margin-left: 350px;
      }
      body.dock-collapsed .main {
        margin-left: 78px;
      }

      /* When collapsed, keep the handle reachable and avoid any accidental overlay */
      body.dock-collapsed .chatDock {
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.65);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.25);
      }
      .tabs {
        display: flex;
        gap: 8px;
      }
      .tab {
        cursor: pointer;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.02);
        color: var(--text);
        font-weight: 700;
        font-size: 13px;
        transition: 0.15s ease;
        user-select: none;
      }
      .tab.active {
        border-color: rgba(227, 27, 35, 0.7);
        background: rgba(227, 27, 35, 0.1);
      }

      .meta {
        color: var(--muted);
        font-size: 12px;
      }

      .content {
        flex: 1;
        overflow: auto;
        padding: 14px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 12px;
      }
      @media (max-width: 900px) {
        .grid {
          grid-template-columns: 1fr;
        }
        .chatDock {
          left: 12px;
          right: 12px;
          width: auto;
        }
        .main {
          margin-left: 0;
        }
      }

      .card {
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.03),
          rgba(255, 255, 255, 0.01)
        );
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px;
        box-shadow: var(--shadow);
        cursor: pointer;
        transition: 0.15s ease;
        min-height: 120px;
      }
      .card:hover {
        border-color: rgba(227, 27, 35, 0.55);
        transform: translateY(-2px);
      }

      /* 16:9 thumbnail for project/IP cards */
      .thumb16x9 {
        width: 100%;
        aspect-ratio: 16 / 9;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background:
          radial-gradient(
            500px 220px at 20% 10%,
            rgba(227, 27, 35, 0.25),
            transparent 60%
          ),
          radial-gradient(
            520px 240px at 90% 30%,
            rgba(227, 27, 35, 0.12),
            transparent 65%
          ),
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.06),
            rgba(0, 0, 0, 0.15)
          );
        position: relative;
        overflow: hidden;
        margin-bottom: 10px;
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        padding: 10px;
      }

      .thumb16x9::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0),
          rgba(0, 0, 0, 0.55)
        );
        pointer-events: none;
      }
      .thumb16x9 > * {
        position: relative;
        z-index: 1;
      }
      .thumbTitle {
        font-weight: 900;
        font-size: 12px;
        letter-spacing: 0.2px;
        color: rgba(255, 255, 255, 0.92);
        text-shadow: 0 12px 24px rgba(0, 0, 0, 0.65);
        max-width: 78%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .thumbBadge {
        font-size: 10px;
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid rgba(227, 27, 35, 0.35);
        background: rgba(0, 0, 0, 0.35);
        color: #ffd2d5;
        white-space: nowrap;
      }
      .thumb16x9::after {
        content: "封面 16:9";
        position: absolute;
        right: 10px;
        bottom: 10px;
        font-size: 10px;
        padding: 4px 8px;
        border-radius: 999px;
        color: #ffd2d5;
        border: 1px solid rgba(227, 27, 35, 0.35);
        background: rgba(0, 0, 0, 0.35);
        letter-spacing: 0.12em;
      }

      .card .h {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .card .name {
        font-weight: 800;
      }
      .tag {
        font-size: 11px;
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid var(--border);
        color: var(--muted);
        background: rgba(255, 255, 255, 0.02);
        white-space: nowrap;
      }
      .tag.hot {
        border-color: rgba(227, 27, 35, 0.55);
        color: #ffb0b5;
        background: rgba(227, 27, 35, 0.1);
      }
      .tag.good {
        border-color: rgba(34, 197, 94, 0.55);
        color: #bfffd4;
        background: rgba(34, 197, 94, 0.1);
      }

      .card .desc {
        margin-top: 10px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
      }
      .card .kpi {
        display: flex;
        gap: 10px;
        margin-top: 10px;
        flex-wrap: wrap;
      }
      .kpi span {
        font-size: 11px;
        color: #cfcfe3;
        border: 1px solid var(--border);
        padding: 4px 8px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.25);
      }

      .view {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 14px;
        background: rgba(0, 0, 0, 0.2);
        box-shadow: var(--shadow);
      }

      .view h2 {
        margin: 0 0 6px;
      }
      .view .sub {
        color: var(--muted);
        font-size: 12px;
      }

      .split {
        display: grid;
        grid-template-columns: 1.2fr 0.8fr;
        gap: 12px;
        margin-top: 12px;
      }
      @media (max-width: 1100px) {
        .split {
          grid-template-columns: 1fr;
        }
      }

      .panel {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px;
        background: rgba(255, 255, 255, 0.02);
      }
      .panel h3 {
        margin: 0 0 10px;
        font-size: 13px;
      }

      .timeline {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .cp {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.25);
      }
      .cp .lefty {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #444;
      }
      .cp.locked .dot {
        background: #444;
      }
      .cp.doing .dot {
        background: var(--info);
      }
      .cp.pending .dot {
        background: var(--warn);
      }
      .cp.done .dot {
        background: var(--good);
      }
      .cp .t {
        font-weight: 800;
        font-size: 12px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .cp .s {
        font-size: 11px;
        color: var(--muted);
      }

      .mini-btn {
        cursor: pointer;
        font-size: 11px;
        padding: 6px 10px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.02);
        color: var(--text);
      }
      .mini-btn:hover {
        border-color: rgba(227, 27, 35, 0.55);
      }

      .empty {
        color: var(--muted);
        font-size: 12px;
        padding: 18px;
        text-align: center;
      }

      .footerNote {
        margin-top: 12px;
        font-size: 11px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="app">
      <!-- Chat dock: top-right -->
      <section id="chatDock" class="chatDock">
        <div class="dockHandle" id="dockHandle" title="展开/收起助手">
          <div class="dino">🦖</div>
          <div class="handleText">助手</div>
        </div>
        <div class="dockTop">
          <div class="dockBrand">
            <div class="dockLogo" aria-hidden="true"></div>
            <div class="dockText">
              <div class="titleRow">
                <div class="title">FizzDragon · 助手</div>
                <div class="dockPill">BETA</div>
              </div>
              <div class="hint">搜IP / 找人才 / 进项目 / 在IP里提问</div>
            </div>
          </div>
          <div class="dockBtns">
            <div class="iconBtn primary" id="dockMinBtn">收起</div>
            <div class="iconBtn" id="dockClearBtn">清空</div>
          </div>
        </div>
        <div id="chat" class="chat"></div>
        <div class="composer" id="composer">
          <div class="row">
            <input
              id="chatInput"
              class="input"
              placeholder="例如：我想看爱情；我要找佛教背景编剧 北京；进入《莲灯案》"
            />
            <button id="sendBtn" class="btn">发送</button>
          </div>
          <div class="chips" id="quickChips"></div>
        </div>
      </section>

      <main class="main">
        <div class="topbar">
          <div class="tabs">
            <div class="tab active" data-tab="ip">IP广场</div>
            <div class="tab" data-tab="studio">剧组大厅</div>
            <div class="tab" data-tab="talent">人才集市</div>
            <div class="tab" data-tab="pay">支付(占位)</div>
          </div>
          <div class="meta" id="contextMeta">
            当前：IP广场 · 可对话筛选并点击进入
          </div>
        </div>

        <div class="content" id="content"></div>
      </main>
    </div>

    <script>
      // -------------------- Mock Data (MVP demo, replace with API later) --------------------
      const DB = {
        ips: [
          {
            id: "ip_hk_cyber_skater",
            name: "香港滑板女孩 · 赛博朋克",
            stage: "Trailer期",
            tags: ["香港", "赛博朋克", "青春", "动作"],
            logline:
              "在霓虹香港的监控阴影下，一个滑板女孩用街头速度撕开财阀与算法的围城。",
            kpi: {
              valuation: "估值 $200K",
              raised: "已募 $12K",
              target: "目标 $50K",
            },
            trailer: "（占位）Trailer 视频",
            category: "爱情/动作",
            creator: "Pax Studio",

      // -------------------- Helpers --------------------
      const $ = (id) => document.getElementById(id);

      function escapeHtml(str) {
        return String(str)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function setMeta(text) {
        $("contextMeta").textContent = text;
      }

      function pushMsg(role, text, chips) {
        const el = document.createElement("div");
        el.className = `msg ${role}`;
        el.innerHTML = `<div class="b">${escapeHtml(text)}</div>`;
        $("chat").appendChild(el);
        if (chips && chips.length) {
          const c = document.createElement("div");
          c.className = "chips";
          c.style.marginLeft = role === "user" ? "auto" : "0";
          chips.forEach((ch) => {
            const b = document.createElement("div");
            b.className = "chip";
            b.textContent = ch.label;
            b.onclick = () => {
              if (ch.action) ch.action();
            };
            c.appendChild(b);
          });
          $("chat").appendChild(c);
        }
        $("chat").scrollTop = $("chat").scrollHeight;
      }

      function normalize(s) {
        return String(s || "")
          .toLowerCase()
          .replace(/\s+/g, "");
      }

      function matchByKeywords(item, text) {
        const t = normalize(text);
        const bag = [
          item.name,
          item.stage,
          item.role,
          item.location,
          item.bio,
          item.logline,
          ...(item.tags || []),
        ].join(" ");
        return normalize(bag).includes(t);
      }

      function findIPs(query) {
        if (!query) return DB.ips;
        const q = query.split(/[\s,，;；]+/).filter(Boolean);
        return DB.ips.filter((ip) => q.every((k) => matchByKeywords(ip, k)));
      }

      function findTalents(query) {
        if (!query) return DB.talents;
        const q = query.split(/[\s,，;；]+/).filter(Boolean);
        return DB.talents.filter((tl) =>
          q.every((k) => matchByKeywords(tl, k)),
        );
      }

      function findProjects(query) {
        if (!query) return DB.projects;
        const q = query.split(/[\s,，;；]+/).filter(Boolean);
        return DB.projects.filter((p) =>
          q.every((k) =>
            matchByKeywords(
              {
                name: p.name,
                tags: [
                  p.phase,
                  (DB.ips.find((x) => x.id === p.ipId) || {}).name,
                ],
              },
              k,
            ),
          ),
        );
      }

            <div class="footerNote">（MVP）这里后续会接：健康度仪表、预算燃尽、风险灯。</div>

            <h3 style="margin-top:14px">Checkpoint 看板（核心）</h3>
            <div class="timeline">${p.checkpoints.map((cp) => cpItem(cp)).join("")}</div>
            <div class="footerNote">规则：锁定节点不可开始任务；待确认需“确认通过/驳回”才能解锁下一步。</div>
          </div>
          <div class="panel" id="tasks">
            <h3>剧组大厅（谁在干嘛 / 是否在找人）</h3>
            <div class="desc">（MVP）你要求的“客户/制片/岗位/预算/交换/分润”都在这页展示。</div>

            <h3 style="margin-top:12px">剧组成员（Roster）</h3>
            <div class="timeline">
              ${
                (p.roster || [])
                  .map(
                    (r) => `
                <div class="cp done" style="cursor:default">
                  <div class="lefty">
                    <div class="dot"></div>
                    <div style="min-width:0">
                      <div class="t">${escapeHtml(r.role)}</div>
                      <div class="s">${escapeHtml(r.name)}</div>
                    </div>
                  </div>
                  <div class="tag">角色</div>
                </div>
              `,
                  )
                  .join("") || '<div class="empty">暂无成员</div>'
              }
            </div>

            <h3 style="margin-top:12px">招募岗位（Openings）</h3>
            <div class="timeline">
              ${
                (p.openings || [])
                  .map(
                    (o) => `
                <div class="cp ${o.status === "招募中" ? "pending" : "done"}" style="cursor:default">
                  <div class="lefty">
                    <div class="dot"></div>
                    <div style="min-width:0">
                      <div class="t">${escapeHtml(o.role)} · ${escapeHtml(o.status)}</div>
                      <div class="s">要求：${escapeHtml((o.requirements || []).join(" / "))}\n预算：${escapeHtml(o.budgetType)} ${escapeHtml(o.budget)}\n交换：${escapeHtml(o.exchange)}\n分润：${escapeHtml(o.revshare)}</div>
                    </div>
                  </div>
                  <div class="tag hot">招募</div>
                </div>
              `,
                  )
                  .join("") || '<div class="empty">暂无招募</div>'
              }
            </div>

            <h3 style="margin-top:12px">任务看板（挂载到 Checkpoint）</h3>
            ${taskList(p)}
            <div style="display:flex; gap:8px; margin-top:10px; flex-wrap:wrap">
              <button class="mini-btn" onclick="alert('MVP占位：发布任务会同步到人才集市任务广场')">发布任务</button>
              <button class="mini-btn" onclick="window.__FD.openPay('settle','${p.id}')">结算/付款(占位)</button>
            </div>
          </div>
        </div>
      `;
        return wrap;
      }

      function taskList(p) {
        if (!p.tasks.length) return '<div class="empty">暂无任务</div>';
        const rows = p.tasks
          .map((t) => {
            const blocked = t.status === "blocked";
            const tag = blocked
              ? '<span class="tag">blocked</span>'
              : t.status === "review"
                ? '<span class="tag hot">review</span>'
                : '<span class="tag">' + escapeHtml(t.status) + "</span>";
            const cp = p.checkpoints.find((x) => x.key === t.checkpoint);
            const cpStatus = cp?.status || "locked";
            return `
          <div class="cp ${cpStatus === "locked" ? "locked" : cpStatus === "pending" ? "pending" : cpStatus === "doing" ? "doing" : "done"}" style="cursor:default">
            <div class="lefty">
              <div class="dot"></div>
              <div style="min-width:0">
                <div class="t">${escapeHtml(t.title)}</div>
                <div class="s">checkpoint=${escapeHtml(t.checkpoint)} · 预算=${escapeHtml(t.budget)}</div>
              </div>
            </div>
            ${tag}
          </div>
        `;
          })
          .join("");
        return `<div class="timeline">${rows}</div>`;
      }

      function renderPay(root) {
        setMeta("当前：支付占位 · 不接真实支付，但页面/流程要完整");
        state.chatContext = "pay";

        const wrap = document.createElement("div");
        wrap.className = "view";
        wrap.innerHTML = `
        <h2>支付中心（占位）</h2>
        <div class="sub">MVP：不接真实支付，但需要完整 UI / 状态 / 路由。后续接 Stripe/USDT 等。</div>

        <div class="split">
          <div class="panel">
            <h3>Checkout</h3>
            <div class="desc">用途：投资 / 结算 / 订阅（后续）</div>
            <div style="margin-top:10px; display:flex; gap:8px; flex-wrap:wrap">
              <button class="mini-btn" onclick="window.__FD.mockPay('success')">模拟成功</button>
              <button class="mini-btn" onclick="window.__FD.mockPay('failed')">模拟失败</button>
              <button class="mini-btn" onclick="window.__FD.mockPay('pending')">模拟等待</button>
            </div>
            <div class="footerNote">（MVP）这里会被 IP详情/赛博片场 的“投资/结算”入口带参数跳转。</div>
          </div>
          <div class="panel">
            <h3>Result</h3>
            <div id="payResult" class="desc">当前状态：未开始</div>
          </div>
        </div>
      `;
        root.appendChild(wrap);
      }

      // -------------------- Chat Router (MVP, rule-based) --------------------
      function handleChat(text) {
        const t = text.trim();
        if (!t) return;
        pushMsg("user", t);

        // quick command: switch tabs
        if (/^(ip广场|ip)$/i.test(t)) return switchTab("ip");
        if (/^(剧组|片场|studio|剧组大厅)$/i.test(t))
          return switchTab("studio");
        if (/^(人才|talent|人才集市)$/i.test(t)) return switchTab("talent");
        if (/^(支付|pay)$/i.test(t)) return switchTab("pay");

        // contextual search
        if (state.chatContext === "ip" || state.chatContext === "ip_detail") {
          if (/投资|支付|checkout|买/.test(t)) {
            const id = state.selectedIpId || DB.ips[0].id;
            pushMsg("ai", "好的，进入支付页面（占位）。后续会接真实支付回调。");
            return openPay("invest", id);
          }

          if (/进入|打开|看|观看/.test(t)) {
            // try match ip by name substring
            const ip = DB.ips.find((x) =>
              normalize(t).includes(normalize(x.name).slice(0, 6)),
            );
            if (ip) {
              openIP(ip.id);
              pushMsg("ai", `已打开：${ip.name}`);
              return;
            }
          }

          // Q&A within ip detail
          if (state.chatContext === "ip_detail" && state.selectedIpId) {
            const ip = DB.ips.find((x) => x.id === state.selectedIpId);
            const answer = answerIpQ(ip, t);
            const link = makeLink("ip", ip.id);
            pushMsg("ai", `${answer}\n\n链接：${link}`, [
              { label: "路线图", action: () => scrollToSection("roadmap") },
              { label: "进入剧组", action: () => openProjectForIP(ip.id) },
              { label: "继续找IP", action: () => switchTab("ip") },
            ]);
            return;
          }

          // search ips
          const results = findIPs(t);
          if (results.length) {
            pushMsg(
              "ai",
              `我找到了 ${results.length} 个匹配IP（点击进入，或复制链接）：`,
              results.slice(0, 6).map((ip) => ({
                label: `${ip.name} · ${ip.category || ""} · ${ip.fundraising || ""}`,
                action: () => openIP(ip.id),
              })),
            );
            const links = results
              .slice(0, 6)
              .map((ip) => `${ip.name}：${makeLink("ip", ip.id)}`)
              .join("\n");
            pushMsg("ai", `链接列表：\n${links}`);
          } else {
            pushMsg(
              "ai",
              "没找到匹配的IP。你可以换一种问法，比如：\n- 我想看香港/赛博朋克/悬疑\n- 找女性向古风悬疑",
            );
          }
          return;
        }

        if (state.chatContext === "talent") {
          const results = findTalents(t);
          if (results.length) {
            pushMsg(
              "ai",
              `我找到了 ${results.length} 位/组匹配人才（点击查看，或复制链接）：`,
              results.slice(0, 6).map((tl) => ({
                label: `${tl.name} · ${tl.role} · ${tl.location} · ${tl.rating}`,
                action: () => openTalent(tl.id),
              })),
            );
            const links = results
              .slice(0, 6)
              .map((tl) => `${tl.name}：${makeLink("talent", tl.id)}`)
              .join("\n");
            pushMsg("ai", `链接列表：\n${links}`);
          } else {
            pushMsg(
              "ai",
              "没找到匹配人才。你可以更具体一点：\n- 佛教背景 编剧 北京\n- 赛博朋克 美术 香港\n- 北大 摄影 后期",
            );
          }
          return;
        }

        if (state.chatContext === "studio") {
          const results = findProjects(t);
          if (results.length) {
            pushMsg(
              "ai",
              `我找到了 ${results.length} 个项目（点击进入）：`,
              results.slice(0, 6).map((p) => ({
                label: p.name,
                action: () => openProject(p.id),
              })),
            );
          } else {
            pushMsg(
              "ai",
              "没找到匹配项目。你可以问：\n- 看香港滑板女孩的项目\n- 莲灯案进度",
            );
          }
          return;
        }

        // default
        pushMsg(
          "ai",
          "我懂了。你可以先切换模块：IP广场 / 剧组大厅 / 人才集市，然后用关键词筛选。",
        );
      }

      function answerIpQ(ip, q) {
        if (/看点|卖点|hook|亮点/.test(q))
          return `看点：\n- ${ip.tags.slice(0, 3).join(" / ")}\n- ${ip.logline}\n\n当前阶段：${ip.stage}`;
        if (/主角|人物/.test(q))
          return `（MVP占位）人物卡片后续接入：主角/反派/关键关系。\n现在先按一句话卖点：${ip.logline}`;
        if (/进度|阶段|路线图/.test(q))
          return `当前阶段：${ip.stage}\n下一步：进入剧组大厅推进 Checkpoint（剧本→人物→分镜→试剪→交付）。`;
        if (/受众|人群|女生|用户/.test(q)) {
          if (ip.tags.includes("女性向"))
            return "受众：女性向/悬疑爱好者/古风题材用户。";
          return "受众：偏年轻人/喜欢强风格与快节奏的用户。";
        }
        if (/投资|多少钱|募资/.test(q))
          return `募资信息：${ip.kpi.raised} / ${ip.kpi.target}（${ip.kpi.valuation}）\n（MVP：支付页面已做，占位不接真实支付）`;
        return `我可以回答：看点/受众/阶段/募资/路线图/进入剧组。\n你刚才问的是：${q}`;
      }

      // -------------------- Navigation --------------------
      function switchTab(tab) {
        state.tab = tab;
        state.view = { type: "list", id: null };
        state.selectedIpId = null;
        state.selectedTalentId = null;
        state.selectedProjectId = null;

        document
          .querySelectorAll(".tab")
          .forEach((x) => x.classList.toggle("active", x.dataset.tab === tab));
        render();

        if (tab === "ip")
          pushMsg(
            "ai",
            "你在 IP广场：可以问“我想看什么内容”，我会给你项目列表，点一下就进详情。",
          );
        if (tab === "talent")
          pushMsg(
            "ai",
            "你在 人才集市：可以问“我要做佛教项目，找北京/北大/某背景的编剧/美术/摄影”。",
          );
        if (tab === "studio")
          pushMsg(
            "ai",
            "你在 剧组大厅：可以问“某项目进度/当前checkpoint/有哪些任务”。",
          );
        if (tab === "pay")
          pushMsg(
            "ai",
            "你在 支付占位页：目前不接真实支付，但支持完整流程与结果页。",
          );
      }

      function openIP(ipId) {
        state.tab = "ip";
        document
          .querySelectorAll(".tab")
          .forEach((x) => x.classList.toggle("active", x.dataset.tab === "ip"));
        state.selectedIpId = ipId;
        state.view = { type: "ip_detail", id: ipId };
        setHash("ip", ipId);
        render();
      }

      function openTalent(talentId) {
        state.tab = "talent";
        document
          .querySelectorAll(".tab")
          .forEach((x) =>
            x.classList.toggle("active", x.dataset.tab === "talent"),
          );
        state.selectedTalentId = talentId;
        state.view = { type: "talent_detail", id: talentId };
        setHash("talent", talentId);
        render();
      }

      function openProject(projectId) {
        state.tab = "studio";
        document
          .querySelectorAll(".tab")
          .forEach((x) =>
            x.classList.toggle("active", x.dataset.tab === "studio"),
          );
        state.selectedProjectId = projectId;
        state.view = { type: "project_detail", id: projectId };
        setHash("studio", projectId);
        render();
      }

      function openProjectForIP(ipId) {
        const p = DB.projects.find((x) => x.ipId === ipId);
        if (!p) {
          pushMsg(
            "ai",
            "这个IP还没有创建剧组项目（MVP占位）。后续 admin 可一键创建。",
          );
          return;
        }
        openProject(p.id);
      }

      function openPay(kind, refId) {
        state.tab = "pay";
        document
          .querySelectorAll(".tab")
          .forEach((x) =>
            x.classList.toggle("active", x.dataset.tab === "pay"),
          );
        state.view = { type: "list", id: null };
        render();
        const tip = kind === "invest" ? "投资" : "结算";
        const el = $("payResult");
        if (el)
          el.textContent = `当前状态：未开始（入口=${tip}，关联=${refId}）`;
      }

      function mockPay(status) {
        const el = $("payResult");
        if (!el) return;
        if (status === "success")
          el.textContent = "当前状态：SUCCESS（模拟成功，后续接支付回调）";
        if (status === "failed")
          el.textContent = "当前状态：FAILED（模拟失败，可重试）";
        if (status === "pending")
          el.textContent = "当前状态：PENDING（等待回调/人工确认）";
      }

      function searchInChat(q) {
        $("chatInput").value = q;
        handleChat(q);
      }

      function scrollToSection(id) {
        const el = document.getElementById(id);
        if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      function setHash(kind, id) {
        try {
          window.location.hash = `${kind}:${id}`;
        } catch (e) {}
      }
      function parseHash() {
        const h = (window.location.hash || "").replace("#", "");
        const m = h.match(/^(ip|talent|studio):(.+)$/);
        if (!m) return null;
        return { kind: m[1], id: m[2] };
      }
      function makeLink(kind, id) {
        return `${window.location.origin}${window.location.pathname}#${kind}:${id}`;
      }

      // expose for inline handlers
      window.__FD = {
        switchTab,
        openIP,
        openTalent,
        openProject,
        openProjectForIP,
        openPay,
        mockPay,
        searchInChat,
        makeLink,
        setHash,
      };

      // -------------------- Boot --------------------
      function boot() {
        // tabs
        document.querySelectorAll(".tab").forEach((tab) => {
          tab.onclick = () => switchTab(tab.dataset.tab);
        });

        // dock buttons
        function setDockCollapsed(collapsed) {
          const d = $("chatDock");

          // If we collapse, exit "min" mode (min is for compact open state)
          if (collapsed) {
            d.classList.remove("min");
            document.body.classList.remove("dock-min");
            $("dockMinBtn").textContent = "收起";
          }

          d.classList.toggle("collapsed", collapsed);
          document.body.classList.toggle("dock-collapsed", collapsed);

          // ensure expanded view is visible when not collapsed
          if (!collapsed) {
            $("chat").style.display = "block";
            $("composer").style.display = "block";
          }
        }

        $("dockHandle").onclick = () => {
          const d = $("chatDock");
          const collapsed = !d.classList.contains("collapsed");
          setDockCollapsed(collapsed);
        };

        $("dockMinBtn").onclick = () => {
          const d = $("chatDock");
          const min = d.classList.toggle("min");
          document.body.classList.toggle("dock-min", min);
          $("composer").style.display = min ? "none" : "block";
          $("chat").style.display = min ? "none" : "block";
          $("dockMinBtn").textContent = min ? "展开" : "收起";
        };
        $("dockClearBtn").onclick = () => {
          $("chat").innerHTML = "";
        };

        // send
        $("sendBtn").onclick = () => {
          const v = $("chatInput").value;
          $("chatInput").value = "";
          handleChat(v);
        };
        $("chatInput").addEventListener("keydown", (e) => {
          if (e.key === "Enter") $("sendBtn").click();
        });

        // quick chips
        const chips = [
          { label: "我想看香港赛博朋克", q: "香港 赛博朋克" },
          { label: "找佛教背景编剧 北京", q: "佛教 编剧 北京" },
          { label: "莲灯案进度", q: "莲灯案" },
          { label: "去人才集市", q: "人才集市" },
          { label: "去剧组大厅", q: "剧组大厅" },
        ];
        const qc = $("quickChips");
        chips.forEach((c) => {
          const b = document.createElement("div");
          b.className = "chip";
          b.textContent = c.label;
          b.onclick = () => handleChat(c.q);
          qc.appendChild(b);
        });

        // greet
        pushMsg(
          "ai",
          "我在右上角。\n\n你可以：\n1) 在IP广场问“我想看什么内容”→我会给你可点击的IP链接\n2) 在人才集市问“我要找佛教/北大/北京/香港等背景的人”→给你人才链接\n3) 进入IP后继续问问题（看点/进度/募资/路线图），回答会附链接。\n\n参考风格：fizzdragon.com（MVP先做结构与交互）。",
        );

        // open by hash
        const h = parseHash();
        if (h) {
          if (h.kind === "ip") openIP(h.id);
          else if (h.kind === "talent") openTalent(h.id);
          else if (h.kind === "studio") openProject(h.id);
        } else {
          render();
        }
      }

      boot();
    </script>
  </body>
</html>
